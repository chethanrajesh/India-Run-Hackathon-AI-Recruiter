# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/chethanrajesh/India-Run-Hackathon-AI-Recruiter"

sandbox:
  type: "docker"

  build_command: "docker build -t redrob-ranker ."

  run_command: >
    docker run
    -v /path/to/data:/app/data
    redrob-ranker
    --candidates /app/data/candidates.jsonl
    --jd /app/data/job_description.docx
    --out /app/data/The-Big-OOPs.csv

sandbox_link: "https://github.com/chethanrajesh/India-Run-Hackathon-AI-Recruiter"

# platforms (Docker).

reproduce_command: "python rank.py --candidates ./candidates.jsonl --jd ./job_description.docx --out ./The-Big-OOPs.csv"
# The single command that produces The-Big-OOPs.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

