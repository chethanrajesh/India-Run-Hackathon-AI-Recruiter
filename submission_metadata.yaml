# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Windows Machine"             # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.10"                        # python --version
  os: "Windows 11"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: true                # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 90              # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Gemini"        # e.g. for architecture discussion, code review
  - "GitHub Copilot"  # e.g. for autocomplete
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  - Used Gemini for architectural discussion and rules-engine design. Used Copilot for autocomplete.
  -No candidate data was fed to any external APIs.
  Used ChatGPT to debug Python issues
# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Our high-performance CPU-bound candidate discovery system runs entirely offline. 
  We use SentenceTransformers (BAAI/bge-small-en-v1.5) to generate semantic vectors of candidate summaries, skills, and histories. 
  These 100k vectors are cached via numpy.memmap to strictly adhere to the 16GB RAM limit. 
  During ranking, we perform a FAISS IndexFlatIP search to retrieve the top 3,000 matches, then apply an MMR algorithm to winnow down to a diverse top 800. 
  Finally, we apply a deterministic 6-factor signal fusion model (evaluating Semantic Fit, Career Evidence, Skill Evidence, Availability, Market Demand, and Inconsistencies) 
  to extract the Top 100. Explanations are dynamically generated using factual candidate data without network LLM calls.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
