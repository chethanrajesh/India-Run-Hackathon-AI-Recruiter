# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
Our model Looks at 100,000 candidate profiles and picks the best 100 matches for a job, without using the internet or any AI chatbot calls instead it runs everything locally on a regular computer.
How it works, step by step:
1.Turn profiles into "fingerprints" - Here Each candidate's summary, skills, and work history get converted into a numeric pattern (BGE model) that captures what they are actually about and not just keywords.
2.Stores smartly , not largely - Instead of loading all 100,000 of these fingerprints into memory at once , the system reads them straight off the disk as needed.
3.Find the closest matches - Uses a search tool called FAISS, which quickly finds the 3,000 candidates whose "fingerprint" is most similar to the job description.
4.Avoid duplicates — From those 3,000, it picks a more varied group of 800 — so you don't end up with 50 nearly identical resumes and miss other strong candidates.
5.Score based on 6 things and not just one — Each of those 800 gets rated on: how well they match semantically, their career track record, their actual skills, whether they are available, how in-demand they are, and whether anything about their profile looks inconsistent or suspicious. These six scores get combined into one final number.
6.Pick the top 100 — Top scoring 100 candidates win.
7.Explain the picks honestly — For each finalist, it writes a short explanation using real facts from their profile 

